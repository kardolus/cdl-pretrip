<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="'Space Grotesk',Arial,sans-serif">
  <rect width="720" height="600" fill="#ffffff"/>
  <g fill="none" stroke="#1f2937" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- rear door frame -->
    <rect x="170" y="92" width="380" height="350" rx="6" fill="#f4f6f8"/>
    <!-- door split -->
    <line x1="360" y1="92" x2="360" y2="442" stroke-width="3"/>
    <!-- locking bars -->
    <line x1="232" y1="104" x2="232" y2="430"/><line x1="296" y1="104" x2="296" y2="430"/>
    <line x1="424" y1="104" x2="424" y2="430"/><line x1="488" y1="104" x2="488" y2="430"/>
    <!-- handles -->
    <rect x="296" y="258" width="22" height="12" rx="2" fill="#1f2937" stroke="none"/>
    <rect x="402" y="258" width="22" height="12" rx="2" fill="#1f2937" stroke="none"/>
    <!-- hinges -->
    <g stroke-width="4"><line x1="170" y1="140" x2="158" y2="140"/><line x1="170" y1="267" x2="158" y2="267"/><line x1="170" y1="394" x2="158" y2="394"/>
    <line x1="550" y1="140" x2="562" y2="140"/><line x1="550" y1="267" x2="562" y2="267"/><line x1="550" y1="394" x2="562" y2="394"/></g>
    <!-- ICC / DOT bumper bar -->
    <line x1="200" y1="500" x2="520" y2="500" stroke-width="6"/>
    <line x1="252" y1="442" x2="252" y2="500"/><line x1="468" y1="442" x2="468" y2="500"/>
    <!-- license plate + light -->
    <rect x="330" y="452" width="60" height="30" rx="3" fill="#f4f6f8"/>
    <rect x="352" y="440" width="16" height="8" rx="2" fill="#e9edf1"/>
    <!-- mud flaps -->
    <rect x="150" y="510" width="48" height="64" rx="3" fill="#eef1f4"/>
    <rect x="522" y="510" width="48" height="64" rx="3" fill="#eef1f4"/>
  </g>
  <!-- clearance / ID lights (amber) -->
  <g fill="#d98a00" stroke="#1f2937" stroke-width="1.5">
    <rect x="330" y="70" width="14" height="9" rx="2"/><rect x="353" y="70" width="14" height="9" rx="2"/><rect x="376" y="70" width="14" height="9" rx="2"/>
    <rect x="182" y="78" width="14" height="9" rx="2"/><rect x="524" y="78" width="14" height="9" rx="2"/>
  </g>
  <!-- tail / brake / turn lights (red) -->
  <g fill="#c0392b" stroke="#1f2937" stroke-width="1.5">
    <circle cx="200" cy="404" r="14"/><circle cx="520" cy="404" r="14"/>
  </g>
  <!-- conspicuity tape (red/white) along the bottom rail -->
  <g stroke="none">
    <rect x="200" y="430" width="22" height="10" fill="#c0392b"/><rect x="222" y="430" width="22" height="10" fill="#ffffff"/>
    <rect x="244" y="430" width="22" height="10" fill="#c0392b"/><rect x="266" y="430" width="22" height="10" fill="#ffffff"/>
    <rect x="432" y="430" width="22" height="10" fill="#c0392b"/><rect x="454" y="430" width="22" height="10" fill="#ffffff"/>
    <rect x="476" y="430" width="22" height="10" fill="#c0392b"/><rect x="498" y="430" width="22" height="10" fill="#ffffff"/>
    <rect x="200" y="429" width="320" height="11" fill="none" stroke="#1f2937" stroke-width="1.2"/>
  </g>
  <!-- leader lines -->
  <g stroke="#1f2937" stroke-width="1.4">
    <line x1="430" y1="200" x2="488" y2="200"/>
    <line x1="360" y1="48" x2="360" y2="70"/>
    <line x1="150" y1="404" x2="186" y2="404"/>
    <line x1="360" y1="540" x2="360" y2="500"/>
    <line x1="436" y1="466" x2="390" y2="466"/>
    <line x1="120" y1="542" x2="150" y2="542"/>
    <line x1="300" y1="408" x2="244" y2="434"/>
  </g>
  <!-- callout numbers -->
  <g fill="#0f6b46" font-weight="700" font-size="27" text-anchor="middle">
    <text x="446" y="208">1</text>
    <text x="360" y="40">2</text>
    <text x="138" y="412">3</text>
    <text x="360" y="562">4</text>
    <text x="452" y="474">5</text>
    <text x="108" y="550">6</text>
    <text x="312" y="404">7</text>
  </g>
</svg>
