<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Space Grotesk',Arial,sans-serif">
  <rect width="1000" height="560" fill="#ffffff"/>
  <g fill="none" stroke="#1f2937" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- trailer body -->
    <rect x="110" y="150" width="810" height="190" rx="6" fill="#f4f6f8"/>
    <!-- front wall / headboard accent -->
    <line x1="150" y1="150" x2="150" y2="340"/>
    <!-- side panel seams + rivets line -->
    <line x1="150" y1="245" x2="910" y2="245" stroke-width="2" stroke-dasharray="2 10"/>
    <!-- rear doors (right) -->
    <line x1="850" y1="150" x2="850" y2="340"/>
    <line x1="884" y1="150" x2="884" y2="340" stroke-width="2"/>
    <circle cx="858" cy="248" r="4" fill="#1f2937"/>
    <!-- upper coupler / apron + kingpin (front underside) -->
    <path d="M150 340 L150 372 L250 372 L250 340" fill="#e9edf1"/>
    <rect x="186" y="372" width="16" height="22" fill="#1f2937" stroke="none"/>
    <!-- landing gear -->
    <line x1="300" y1="340" x2="300" y2="470"/><line x1="330" y1="340" x2="330" y2="470"/>
    <line x1="288" y1="470" x2="342" y2="470" stroke-width="5"/>
    <circle cx="356" cy="356" r="12"/><line x1="356" y1="356" x2="372" y2="356"/>
    <!-- frame rail under body -->
    <line x1="250" y1="346" x2="660" y2="346" stroke-width="2"/>
    <!-- tandem axle wheels -->
    <circle cx="690" cy="404" r="56" fill="#f4f6f8"/><circle cx="690" cy="404" r="22"/>
    <circle cx="800" cy="404" r="56" fill="#f4f6f8"/><circle cx="800" cy="404" r="22"/>
    <!-- suspension between/over axles -->
    <path d="M648 360 q42 -20 84 0 q55 -18 110 0" stroke-width="3"/>
    <!-- brake chamber hint over front tandem axle -->
    <rect x="664" y="330" width="34" height="20" rx="3" fill="#e9edf1"/>
    <!-- mud flap -->
    <line x1="868" y1="404" x2="868" y2="476" stroke-width="3"/>
    <path d="M868 476 L912 476 L912 408" stroke-width="3"/>
    <!-- marker / clearance lights along top -->
    <rect x="176" y="138" width="16" height="10" rx="2" fill="#e9edf1"/>
    <rect x="496" y="138" width="16" height="10" rx="2" fill="#e9edf1"/>
    <rect x="820" y="138" width="16" height="10" rx="2" fill="#e9edf1"/>
    <!-- ABS light box low on side -->
    <rect x="560" y="318" width="20" height="14" rx="2" fill="#e9edf1"/>
  </g>
  <!-- leader lines -->
  <g stroke="#1f2937" stroke-width="1.4">
    <line x1="150" y1="120" x2="150" y2="150"/>
    <line x1="196" y1="430" x2="196" y2="394"/>
    <line x1="520" y1="120" x2="504" y2="138"/>
    <line x1="315" y1="500" x2="315" y2="470"/>
    <line x1="470" y1="372" x2="455" y2="346"/>
    <line x1="744" y1="300" x2="720" y2="346"/>
    <line x1="664" y1="300" x2="678" y2="332"/>
    <line x1="745" y1="476" x2="745" y2="430"/>
    <line x1="912" y1="370" x2="900" y2="430"/>
    <line x1="828" y1="118" x2="828" y2="138"/>
    <line x1="600" y1="300" x2="572" y2="318"/>
  </g>
  <!-- callout numbers -->
  <g fill="#0f6b46" font-weight="700" font-size="27" text-anchor="middle">
    <text x="150" y="112">1</text>
    <text x="196" y="452">2</text>
    <text x="528" y="112">3</text>
    <text x="315" y="522">4</text>
    <text x="478" y="386">5</text>
    <text x="754" y="292">6</text>
    <text x="652" y="292">7</text>
    <text x="745" y="498">8</text>
    <text x="928" y="364">9</text>
    <text x="828" y="110">10</text>
    <text x="612" y="294">11</text>
  </g>
</svg>
